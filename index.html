<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Figurinhas 26">
<meta name="theme-color" content="#0F1F3D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Figurinhas Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Barlow', sans-serif;
    background: #0A1628;
    color: #F0F4FF;
    min-height: 100vh;
    /* Safe area para iPhone com notch */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .header { background: #0F1F3D; border-bottom: 1px solid rgba(255,255,255,0.12); padding: 0 16px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 700px; margin: 0 auto; }
  .header-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 10px 0 4px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: #F5C518; line-height: 1; white-space: nowrap; }
  .logo span { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: #8BA3CC; font-weight: 500; letter-spacing: 0.5px; }
  .stats { display: flex; gap: 5px; flex: 1; justify-content: flex-end; flex-wrap: wrap; }
  .stat { background: #1A2F52; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 3px 9px; font-size: 11px; color: #8BA3CC; display: flex; align-items: center; gap: 4px; }
  .stat strong { color: #F0F4FF; font-weight: 600; font-size: 13px; }
  .stat.gold strong { color: #F5C518; }
  .progress-track { height: 3px; background: #162647; border-radius: 3px; overflow: hidden; margin: 6px 0 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #00A86B, #F5C518); border-radius: 3px; width: 0%; transition: width 0.4s ease; }

  .controls { background: #0F1F3D; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 63px; z-index: 99; }
  .controls-inner { max-width: 700px; margin: 0 auto; display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 130px; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; }
  input[type=text] { width: 100%; padding: 7px 9px 7px 28px; background: #1A2F52; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #F0F4FF; font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; -webkit-appearance: none; }
  input[type=text]::placeholder { color: #4D6A94; }
  input[type=text]:focus { border-color: #00A86B; }

  .btn { padding: 6px 11px; font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; background: transparent; color: #8BA3CC; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s; }
  .btn.active { background: #00A86B; border-color: #00A86B; color: #fff; }
  .btn.danger { border-color: rgba(231,76,60,0.4); color: #e74c3c; }

  .main { max-width: 700px; margin: 0 auto; padding: 14px 16px 80px; }

  .sec { margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
  .sec-hdr { display: flex; align-items: center; gap: 10px; padding: 9px 13px; background: #1A2F52; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .sec.open .sec-hdr { background: #1F3660; }
  .sec-key { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: #F5C518; min-width: 42px; }
  .sec-name { font-size: 12px; color: #8BA3CC; flex: 1; font-weight: 500; }
  .sec-minibar { width: 50px; height: 3px; background: #0A1628; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .sec-minifill { height: 100%; background: #00A86B; border-radius: 3px; }
  .sec-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; background: #0F1F3D; color: #8BA3CC; border: 1px solid rgba(255,255,255,0.08); }
  .sec-badge.done { background: rgba(0,168,107,0.2); color: #00A86B; border-color: rgba(0,168,107,0.4); }
  .sec-arrow { color: #4D6A94; font-size: 11px; transition: transform 0.2s; display: inline-block; }
  .sec.open .sec-arrow { transform: rotate(90deg); }
  .sec-body { display: none; padding: 11px 13px; background: #162647; }
  .sec.open .sec-body { display: block; }

  .sticker-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .stk { width: 46px; height: 46px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: #1A2F52; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; transition: transform 0.1s, background 0.12s, border-color 0.12s; }
  .stk:active { transform: scale(0.88); }
  .stk.owned { background: #007A4D; border-color: #00A86B; }
  .stk-star { position: absolute; top: 2px; right: 4px; font-size: 8px; color: #F5C518; display: none; }
  .stk.owned .stk-star { display: block; }
  .stk-num { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; line-height: 1; color: #8BA3CC; }
  .stk.owned .stk-num { color: #fff; }
  .stk-code { font-size: 9px; line-height: 1; margin-top: 2px; color: #4D6A94; }
  .stk.owned .stk-code { color: rgba(255,255,255,0.6); }

  .empty { text-align: center; padding: 60px 20px; color: #4D6A94; font-size: 15px; }

  .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0F1F3D; border-top: 1px solid rgba(255,255,255,0.07); padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); text-align: center; font-size: 11px; color: #4D6A94; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #0F1F3D; border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 28px 24px; max-width: 300px; width: 100%; animation: popin 0.2s ease; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #e74c3c; margin-bottom: 10px; letter-spacing: 1px; }
  .modal-text { font-size: 14px; color: #8BA3CC; line-height: 1.6; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 11px; font-size: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; border-radius: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .modal-cancel  { border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #8BA3CC; }
  .modal-confirm { border: none; background: #e74c3c; color: #fff; }

  .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(10px); background: #007A4D; color: #fff; padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; z-index: 200; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes popin { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Figurinhas <span>COPA 2026</span></div>
      <div class="stats">
        <div class="stat"><strong id="s-owned">0</strong>coladas</div>
        <div class="stat"><strong id="s-miss">0</strong>faltam</div>
        <div class="stat"><strong id="s-total">0</strong>total</div>
        <div class="stat gold"><strong id="s-pct">0%</strong></div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F0F4FF" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar... (BRA, ARG...)">
    </div>
    <button class="btn active" id="btn-all"     onclick="setFilter('all',this)">Todas</button>
    <button class="btn"        id="btn-owned"   onclick="setFilter('owned',this)">Tenho</button>
    <button class="btn"        id="btn-missing" onclick="setFilter('missing',this)">Faltam</button>
    <button class="btn"        onclick="expandAll()">▼ Tudo</button>
    <button class="btn"        onclick="collapseAll()">▶ Fechar</button>
    <button class="btn danger" onclick="document.getElementById('modal').classList.add('show')">Reset</button>
  </div>
</div>

<div class="main" id="main"></div>

<div class="footer">Copa do Mundo FIFA 2026 · Álbum de Figurinhas</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-title">Resetar álbum?</div>
    <div class="modal-text">Todas as figurinhas marcadas serão apagadas. Essa ação não pode ser desfeita.</div>
    <div class="modal-btns">
      <button class="modal-cancel"  onclick="document.getElementById('modal').classList.remove('show')">Cancelar</button>
      <button class="modal-confirm" onclick="doReset()">Sim, resetar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SECTIONS = [
  { key:'FWC', label:'FIFA World Cup History', s:0, e:19 },
  { key:'CC',  label:'Coca-Cola', s:1, e:14 },
  { key:'MEX', label:'México · Grupo A', s:1, e:20 },
  { key:'RSA', label:'África do Sul · Grupo A', s:1, e:20 },
  { key:'KOR', label:'Coreia do Sul · Grupo A', s:1, e:20 },
  { key:'CZE', label:'Rep. Tcheca · Grupo A', s:1, e:20 },
  { key:'CAN', label:'Canadá · Grupo B', s:1, e:20 },
  { key:'BIH', label:'Bósnia · Grupo B', s:1, e:20 },
  { key:'QAT', label:'Catar · Grupo B', s:1, e:20 },
  { key:'SUI', label:'Suíça · Grupo B', s:1, e:20 },
  { key:'BRA', label:'Brasil · Grupo C', s:1, e:20 },
  { key:'MAR', label:'Marrocos · Grupo C', s:1, e:20 },
  { key:'HAI', label:'Haiti · Grupo C', s:1, e:20 },
  { key:'SCO', label:'Escócia · Grupo C', s:1, e:20 },
  { key:'USA', label:'Estados Unidos · Grupo D', s:1, e:20 },
  { key:'PAR', label:'Paraguai · Grupo D', s:1, e:20 },
  { key:'AUS', label:'Austrália · Grupo D', s:1, e:20 },
  { key:'TUR', label:'Turquia · Grupo D', s:1, e:20 },
  { key:'GER', label:'Alemanha · Grupo E', s:1, e:20 },
  { key:'CUW', label:'Curaçao · Grupo E', s:1, e:20 },
  { key:'CIV', label:'Costa do Marfim · Grupo E', s:1, e:20 },
  { key:'ECU', label:'Equador · Grupo E', s:1, e:20 },
  { key:'NED', label:'Holanda · Grupo F', s:1, e:20 },
  { key:'JPN', label:'Japão · Grupo F', s:1, e:20 },
  { key:'SWE', label:'Suécia · Grupo F', s:1, e:20 },
  { key:'TUN', label:'Tunísia · Grupo F', s:1, e:20 },
  { key:'BEL', label:'Bélgica · Grupo G', s:1, e:20 },
  { key:'EGY', label:'Egito · Grupo G', s:1, e:20 },
  { key:'IRN', label:'Irã · Grupo G', s:1, e:20 },
  { key:'NZL', label:'Nova Zelândia · Grupo G', s:1, e:20 },
  { key:'ESP', label:'Espanha · Grupo H', s:1, e:20 },
  { key:'CPV', label:'Cabo Verde · Grupo H', s:1, e:20 },
  { key:'KSA', label:'Arábia Saudita · Grupo H', s:1, e:20 },
  { key:'URU', label:'Uruguai · Grupo H', s:1, e:20 },
  { key:'FRA', label:'França · Grupo I', s:1, e:20 },
  { key:'SEN', label:'Senegal · Grupo I', s:1, e:20 },
  { key:'IRQ', label:'Iraque · Grupo I', s:1, e:20 },
  { key:'NOR', label:'Noruega · Grupo I', s:1, e:20 },
  { key:'ARG', label:'Argentina · Grupo J', s:1, e:20 },
  { key:'ALG', label:'Argélia · Grupo J', s:1, e:20 },
  { key:'AUT', label:'Áustria · Grupo J', s:1, e:20 },
  { key:'JOR', label:'Jordânia · Grupo J', s:1, e:20 },
  { key:'POR', label:'Portugal · Grupo K', s:1, e:20 },
  { key:'COD', label:'Congo · Grupo K', s:1, e:20 },
  { key:'UZB', label:'Uzbequistão · Grupo K', s:1, e:20 },
  { key:'COL', label:'Colômbia · Grupo K', s:1, e:20 },
  { key:'ENG', label:'Inglaterra · Grupo L', s:1, e:20 },
  { key:'CRO', label:'Croácia · Grupo L', s:1, e:20 },
  { key:'GHA', label:'Gana · Grupo L', s:1, e:20 },
  { key:'PAN', label:'Panamá · Grupo L', s:1, e:20 },
];

let owned = {}, openSecs = {}, filter = 'all', toastTimer;

function load() {
  try { owned    = JSON.parse(localStorage.getItem('copa26_owned') || '{}'); } catch(e) {}
  try { openSecs = JSON.parse(localStorage.getItem('copa26_open')  || '{}'); } catch(e) {}
}
function saveOwned() { try { localStorage.setItem('copa26_owned', JSON.stringify(owned));    } catch(e) {} }
function saveOpen()  { try { localStorage.setItem('copa26_open',  JSON.stringify(openSecs)); } catch(e) {} }
function numStr(i)   { return String(i).padStart(2,'0'); }

function secStats(s) {
  let c=0, t=0;
  for (let i=s.s; i<=s.e; i++) { t++; if (owned[s.key+'_'+i]) c++; }
  return {c,t};
}

function updateGlobalStats() {
  let own=0, tot=0;
  SECTIONS.forEach(s => { const {c,t}=secStats(s); own+=c; tot+=t; });
  document.getElementById('s-owned').textContent = own;
  document.getElementById('s-miss').textContent  = tot-own;
  document.getElementById('s-total').textContent = tot;
  document.getElementById('s-pct').textContent   = tot ? Math.round(own/tot*100)+'%' : '0%';
  document.getElementById('prog').style.width    = tot ? (own/tot*100)+'%' : '0%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function toggle(key, i) {
  const k = key+'_'+i;
  const wasOwned = !!owned[k];
  if (wasOwned) delete owned[k]; else owned[k] = 1;
  saveOwned();
  const el = document.getElementById('stk_'+k);
  if (el) el.classList.toggle('owned', !!owned[k]);
  updateSecBadge(key);
  updateGlobalStats();
  if (!wasOwned) showToast(key+numStr(i)+' colada! ✦');
}

function updateSecBadge(key) {
  const s = SECTIONS.find(x=>x.key===key);
  if (!s) return;
  const {c,t} = secStats(s);
  const badge = document.getElementById('badge_'+key);
  const fill  = document.getElementById('fill_'+key);
  if (badge) { badge.textContent=c+'/'+t; badge.className='sec-badge'+(c===t?' done':''); }
  if (fill)  fill.style.width = Math.round(c/t*100)+'%';
}

function toggleSec(key) {
  openSecs[key] = !openSecs[key];
  saveOpen();
  const el = document.getElementById('sec_'+key);
  if (el) el.classList.toggle('open', !!openSecs[key]);
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.btn[id^=btn-]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function expandAll() {
  SECTIONS.forEach(s => { openSecs[s.key]=true; });
  saveOpen();
  document.querySelectorAll('.sec').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  SECTIONS.forEach(s => { openSecs[s.key]=false; });
  saveOpen();
  document.querySelectorAll('.sec').forEach(el => el.classList.remove('open'));
}

function doReset() {
  owned = {}; saveOwned();
  document.getElementById('modal').classList.remove('show');
  render();
  updateGlobalStats();
  showToast('Álbum resetado');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const main = document.getElementById('main');
  let html = '';
  SECTIONS.forEach(s => {
    if (q && !s.key.toLowerCase().includes(q) && !s.label.toLowerCase().includes(q)) return;
    const {c,t} = secStats(s);
    const isOpen = !!openSecs[s.key];
    const pct = Math.round(c/t*100);
    let stickersHtml='', count=0;
    for (let i=s.s; i<=s.e; i++) {
      const k=s.key+'_'+i, isOwned=!!owned[k];
      if (filter==='owned'   && !isOwned) continue;
      if (filter==='missing' &&  isOwned) continue;
      stickersHtml += `<div class="stk${isOwned?' owned':''}" id="stk_${k}" onclick="toggle('${s.key}',${i})">
        <span class="stk-star">✦</span>
        <span class="stk-num">${numStr(i)}</span>
        <span class="stk-code">${s.key}</span>
      </div>`;
      count++;
    }
    if (count===0 && filter!=='all') return;
    html += `<div class="sec${isOpen?' open':''}" id="sec_${s.key}">
      <div class="sec-hdr" onclick="toggleSec('${s.key}')">
        <span class="sec-key">${s.key}</span>
        <span class="sec-name">${s.label}</span>
        <div class="sec-minibar"><div class="sec-minifill" id="fill_${s.key}" style="width:${pct}%"></div></div>
        <span class="sec-badge${c===t?' done':''}" id="badge_${s.key}">${c}/${t}</span>
        <span class="sec-arrow">▶</span>
      </div>
      <div class="sec-body"><div class="sticker-grid">${stickersHtml}</div></div>
    </div>`;
  });
  main.innerHTML = html || '<div class="empty">Nenhuma seção encontrada</div>';
  updateGlobalStats();
}

document.getElementById('search').addEventListener('input', render);

// Registra o Service Worker para funcionamento offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

load();
render();
</script>
</body>
</html>
